<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programatica + IA - 970x250</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;box-shadow:none!important;}
    :root{--bg:#000;--fg:#FFF;--cyan:#2DE8D5;--dim:rgba(255,255,255,0.60);--mute:rgba(255,255,255,0.35);--line:rgba(255,255,255,0.20);}
    body{width:970px;height:250px;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",monospace;font-size:14px;line-height:1.6;overflow:hidden;display:flex;align-items:center;padding:32px;}
    .container{display:flex;align-items:center;width:100%;height:100%;justify-content:space-between;gap:32px;}
    .content{flex:1;display:flex;flex-direction:column;justify-content:center;}
    .kicker{font-size:12px;color:var(--cyan);letter-spacing:0.16em;font-weight:700;text-transform:uppercase;margin-bottom:12px;opacity:0;animation:fadeInLeft 0.6s ease-out forwards;}
    .headline{font-family:"Archivo Black",sans-serif;font-size:48px;font-weight:900;text-transform:uppercase;line-height:1.1;letter-spacing:-2px;margin-bottom:12px;opacity:0;animation:fadeInLeft 0.6s ease-out forwards;animation-delay:0.15s;max-width:800px;}
    .headline .highlight{background:var(--cyan);color:var(--bg);padding:0 6px;display:inline-block;}
    .body-text{font-size:13px;color:var(--dim);line-height:1.4;margin-bottom:16px;opacity:0;animation:fadeInLeft 0.6s ease-out forwards;animation-delay:0.3s;max-width:600px;}
    .status-bar{border-top:1px solid var(--line);padding-top:12px;font-size:12px;color:var(--mute);letter-spacing:0.08em;opacity:0;animation:fadeInLeft 0.6s ease-out forwards;animation-delay:0.45s;margin-bottom:12px;}
    .metric{display:inline-block;margin-right:20px;}
    .metric-value{color:var(--cyan);font-weight:700;animation:updateMetric 3s ease-in-out infinite;}
    .cta-section{flex:0 0 auto;display:flex;flex-direction:column;gap:12px;opacity:0;animation:fadeInRight 0.6s ease-out forwards;animation-delay:0.6s;}
    .cta-button{background:var(--cyan);color:var(--bg);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:16px 28px;border:none;cursor:pointer;text-align:center;transition:opacity 0.3s ease;white-space:nowrap;}
    .cta-button:hover{opacity:0.8;}
    .cta-label{font-size:10px;color:var(--mute);letter-spacing:0.12em;text-transform:uppercase;text-align:center;}
    .cursor{display:inline-block;width:2px;height:13px;background:var(--cyan);margin-left:4px;animation:blinkCursor 1s infinite;vertical-align:middle;}
    @keyframes fadeInLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
    @keyframes fadeInRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    @keyframes blinkCursor{0%,49%{opacity:1;}50%,100%{opacity:0;}}
    @keyframes updateMetric{0%{opacity:1;}50%{opacity:0.7;}100%{opacity:1;}}
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="kicker">[PROG-01] PROGRAMATICA &middot; IA</div>
      <h1 class="headline">CADA IMPRESION.<br><span class="highlight">DONDE IMPORTA</span>.</h1>
      <p class="body-text">Programatica + IA para marcas que quieren crecer sin malgastar presupuesto.</p>
      <div class="status-bar">
        <span class="metric">REACH:<span class="metric-value">2.4M</span></span>
        <span class="metric">CTR:<span class="metric-value">0.8%</span></span>
        <span class="metric">ROAS:<span class="metric-value">4.2x</span><span class="cursor"></span></span>
      </div>
    </div>
    <div class="cta-section">
      <button class="cta-button">SOLICITAR<br>PROPUESTA &rarr;</button>
      <div class="cta-label">Sin compromiso</div>
    </div>
  </div>
</body>
</html>
