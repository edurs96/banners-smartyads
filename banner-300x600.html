<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programatica + IA - 300x600</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;box-shadow:none!important;}
    :root{--bg:#000;--fg:#FFF;--cyan:#2DE8D5;--dim:rgba(255,255,255,0.60);--mute:rgba(255,255,255,0.35);--line:rgba(255,255,255,0.20);}
    body{width:300px;height:600px;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",monospace;font-size:14px;line-height:1.6;overflow:hidden;display:flex;flex-direction:column;padding:24px;}
    .container{display:flex;flex-direction:column;height:100%;justify-content:space-between;}
    .kicker{font-size:11px;color:var(--cyan);letter-spacing:0.16em;font-weight:700;text-transform:uppercase;margin-bottom:12px;opacity:0;animation:fadeInDown 0.6s ease-out forwards;}
    .headline{font-family:"Archivo Black",sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;line-height:1.1;letter-spacing:-2px;margin-bottom:16px;opacity:0;animation:fadeInDown 0.6s ease-out forwards;animation-delay:0.2s;}
    .headline .highlight{background:var(--cyan);color:var(--bg);padding:0 4px;display:inline-block;}
    .body-text{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:16px;opacity:0;animation:fadeInUp 0.6s ease-out forwards;animation-delay:0.4s;}
    .status-bar{border-top:1px solid var(--line);padding-top:12px;margin:16px 0;font-size:11px;color:var(--mute);letter-spacing:0.08em;opacity:0;animation:fadeInUp 0.6s ease-out forwards;animation-delay:0.6s;}
    .metric{display:inline-block;margin-right:12px;}
    .metric-value{color:var(--cyan);font-weight:700;animation:updateMetric 3s ease-in-out infinite;}
    .cta-button{background:var(--cyan);color:var(--bg);font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:14px 20px;border:none;cursor:pointer;text-align:center;margin-top:12px;transition:opacity 0.3s ease;opacity:0;animation:fadeInUp 0.6s ease-out forwards;animation-delay:0.8s;width:100%;}
    .cta-button:hover{opacity:0.8;}
    .cursor{display:inline-block;width:2px;height:14px;background:var(--cyan);margin-left:4px;animation:blinkCursor 1s infinite;vertical-align:middle;}
    @keyframes fadeInDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes blinkCursor{0%,49%{opacity:1;}50%,100%{opacity:0;}}
    @keyframes updateMetric{0%{opacity:1;}50%{opacity:0.7;}100%{opacity:1;}}
  </style>
</head>
<body>
  <div class="container">
    <div>
      <div class="kicker">[PROG-01] PROGRAMATICA &middot; IA</div>
      <h1 class="headline">LLEGA A QUIEN <span class="highlight">DECIDE</span>.</h1>
      <p class="body-text">Visibilidad inteligente. Audiencias reales. Optimizacion automatica con IA.</p>
    </div>
    <div>
      <div class="status-bar">
        <span class="metric">COB:<span class="metric-value">98%</span></span>
        <span class="metric">CPM_<span class="metric-value">OK</span></span>
        <span class="metric">INTENT_<span class="metric-value">MATCH</span><span class="cursor"></span></span>
      </div>
      <button class="cta-button">EMPEZAR &rarr;</button>
    </div>
  </div>
</body>
</html>
